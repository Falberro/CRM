<body>
<div class="app" id="root"></div>
<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
const SHEET_ID='1LT2BGviwchlvf3CgKjxIGpt6YZu-YwYCZj394xefcH8';
const TODAY=new Date();
const MONTHS=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const INCOME_MAP={'hasta 1M':1,'1M a 2M':2,'2M a 3,5M':3,'3,5M a 6M':4,'más 6M':5};
const INCOME_LABEL={'hasta 1M':'<1M','1M a 2M':'1–2M','2M a 3,5M':'2–3.5M','3,5M a 6M':'3.5–6M','más 6M':'+6M'};

// ── COLUMNAS (A=0 … X=23) ────────────────────────────────────────────────────
// A:Nombre B:Relación C:Ubicación D:Ocupación E:Ingreso F:Edad G:Confianza
// H:FechaC I:FechaR1 J:FechaR2 K:ReunionCierre L:Cierre M:Referidos
// N:EtapaActual
// O:ProductoAhorro P:MontoAhorro
// Q:ProductoVida   R:MontoVida
// S:TipoPatrimonial T:PrimaPatrimonial
// U:ProductoInversion V:MontoInversion
// W:Comentario X:ProximoContacto

// ── COMISIONES ───────────────────────────────────────────────────────────────
const COMM = {
  // Ahorro — % sobre prima anual, 50% cierre / 50% a 6 meses
  'Zurich Invest':      {pct:0.3288, tipo:'ahorro_cuotas'},
  'Zurich Invest Joven':{pct:0.3288, tipo:'ahorro_cuotas'},
  'Zurich Impact':      {pct:0.3288, tipo:'ahorro_cuotas'},
  'Life Ahorro':        {pct:0.3537, tipo:'ahorro_cuotas'},
  'IT S&P 15':          {pct:0.3400, tipo:'ahorro_total'},
  'IT S&P 20':          {pct:0.3740, tipo:'ahorro_total'},
  'IT Evolution 15':    {pct:0.2550, tipo:'ahorro_total'},
  'IT Evolution 20':    {pct:0.3400, tipo:'ahorro_total'},
  'IT Evolution 25':    {pct:0.4250, tipo:'ahorro_total'},
  // Vida — % sobre prima anual, 50% cierre / 50% a 6 meses
  'Zurich Options':         {pct:0.4046, tipo:'ahorro_cuotas'},
  'Zurich Easy Life':       {pct:0.4046, tipo:'ahorro_cuotas'},
  'Zurich University':      {pct:0.4046, tipo:'ahorro_cuotas'},
  'Life Vida':              {pct:0.3537, tipo:'ahorro_cuotas'},
  'Life Certus':            {pct:0.3537, tipo:'ahorro_cuotas'},
  // Patrimonial — 7% recurrente
  'Auto':               {pct:0.07, tipo:'patrimonial'},
  'Hogar':              {pct:0.07, tipo:'patrimonial'},
  'Comercio':           {pct:0.07, tipo:'patrimonial'},
  'ART':                {pct:0.07, tipo:'patrimonial'},
  'Viaje':              {pct:0.07, tipo:'patrimonial'},
  'Mala praxis':        {pct:0.07, tipo:'patrimonial'},
  // Inversión única — 3% del monto total
  'Zurich Advanced':    {pct:0.03, tipo:'inversion_unica'},
  'IT Platinum':        {pct:0.03, tipo:'inversion_unica'},
  'IT Access':          {pct:0.03, tipo:'inversion_unica'},
  // INVIU — ~USD 1 por cada USD 1000 invertido / mes
  'Inviu pasiva':       {pct:0.001, tipo:'inviu'},
  'Inviu activa':       {pct:0.001, tipo:'inviu'},
};

function calcComision(producto, monto){
  if(!producto||!monto)return null;
  const n=parseFloat(String(monto).replace(/[^0-9.]/g,''));
  if(isNaN(n)||n<=0)return null;
  const c=COMM[producto];
  if(!c)return null;
  const total=n*c.pct;
  if(c.tipo==='ahorro_cuotas'){
    return{total,cobrada:total/2,pendiente:total/2,esquema:'50% cierre / 50% a 6 meses',tipo:c.tipo};
  }
  if(c.tipo==='ahorro_total'){
    return{total,cobrada:total,pendiente:0,esquema:'100% al cierre',tipo:c.tipo};
  }
  if(c.tipo==='patrimonial'){
    return{total,cobrada:total,pendiente:0,esquema:'Recurrente anual',tipo:c.tipo};
  }
  if(c.tipo==='inversion_unica'){
    return{total,cobrada:total,pendiente:0,esquema:'3% del monto',tipo:c.tipo};
  }
  if(c.tipo==='inviu'){
    return{total,cobrada:0,pendiente:0,mensual:total,esquema:'~USD '+total.toFixed(0)+'/mes estimado',tipo:c.tipo};
  }
  return null;
}

function formatNum(n,prefix='$'){
  if(n==null||isNaN(n))return'—';
  if(n>=1000000)return prefix+(n/1000000).toFixed(2)+'M';
  if(n>=1000)return prefix+(n/1000).toFixed(1)+'k';
  return prefix+Math.round(n).toLocaleString('es-AR');
}

// ── PRODUCT LOGIC (sugerido para prospectos) ─────────────────────────────────
function suggestProduct(p){
  const loc=(p.ubicacion||'').toLowerCase().trim();
  const isAbroad=loc!==''&&loc!=='argentina'&&loc!=='arg';
  const inc=INCOME_MAP[p.ingreso]||0;
  const age=p.edad||'';
  const isOld=age.includes('50')||age.includes('60')||age.includes('70');
  if(isAbroad)return{label:'IT exterior',cls:'bp'};
  if(isOld)   return{label:'IT / INVIU',cls:'bt'};
  if(inc>=3)  return{label:'Zurich Retiro',cls:'bb'};
  return             {label:'Life',cls:'bg'};
}

// ── SCORING ──────────────────────────────────────────────────────────────────
function relScore(v){
  v=(v||'').toLowerCase();
  if(['madre','padre','hermano','hermana','suegra','suegro','cuñada','cuñado','esposa','esposo'].some(x=>v.includes(x)))return 5;
  if(['amigo','prima','primo','tío','tía','concuñado'].some(x=>v.includes(x)))return 4;
  if(['referido','novia','novio'].some(x=>v.includes(x)))return 3;
  if(['ex ball','ex quilmes','ex bgh','ex isover','ex unqui','elac','q21'].some(x=>v.includes(x)))return 2;
  return 1;
}
function stageScore(s){
  if(!s)return 0; s=s.toLowerCase();
  if(s.includes('cerrado')||s.includes('ganado'))return 10;
  if(s.includes('reunión 2')||s.includes('reunion 2'))return 8;
  if(s.includes('reunión 1')||s.includes('reunion 1'))return 5;
  if(s.includes('solo contactado'))return 3;
  return 0;
}
function calcScore(p){
  const inc=(INCOME_MAP[p.ingreso]||0)/5;
  const conf=(parseFloat(p.confianza)||0)/5;
  const rel=relScore(p.relacion)/5;
  const stage=stageScore(p.etapa)/8;
  const d=p.diasSinActividad;
  let temp=1;
  if(d!==null){if(d>60)temp=0.2;else if(d>30)temp=0.5;else if(d>14)temp=0.7;}
  return Math.round((inc*0.30+conf*0.25+stage*0.20+temp*0.15+rel*0.10)*100);
}

// ── PRÓXIMO CONTACTO ─────────────────────────────────────────────────────────
function proximoContactoChip(val){
  if(!val)return null;
  const v=String(val).trim();
  if(v.toUpperCase()==='NO')return{label:'Descartado',cls:'chip-no'};
  const d=parseDate(v);
  if(!d)return null;
  const dias=Math.floor((d-TODAY)/86400000);
  if(dias<0)return{label:'⚡ Vencido '+d.toLocaleDateString('es-AR'),cls:'chip-venc'};
  if(dias===0)return{label:'Llamar hoy',cls:'chip-urgent'};
  if(dias===1)return{label:'Llamar mañana',cls:'chip-urgent'};
  return{label:'Llamar '+d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'}),cls:'chip-next'};
}

// ── RE-INTENTO ───────────────────────────────────────────────────────────────
function reintento(p){
  // Si tiene próximo contacto pactado, eso tiene prioridad
  if(p.proximoContactoChip)return p.proximoContactoChip;
  const s=(p.etapa||'').toLowerCase(); const d=p.diasSinActividad;
  if(d===null)return{label:'Sin actividad',cls:'chip-wait'};
  if(s.includes('reunión 2')||s.includes('reunion 2')){
    if(d<=3) return{label:'Cerrar hoy',cls:'chip-urgent'};
    if(d<=7) return{label:'Urgente',cls:'chip-urgent'};
    if(d<=15)return{label:'Esta semana',cls:'chip-soon'};
    if(d<=30)return{label:'Propuesta alt.',cls:'chip-soon'};
    return{label:'Pausa 60d',cls:'chip-wait'};
  }
  if(s.includes('reunión 1')||s.includes('reunion 1')){
    if(d<=5) return{label:'Seguimiento',cls:'chip-ok'};
    if(d<=10)return{label:'Propuesta WA',cls:'chip-soon'};
    if(d<=21)return{label:'¿Cambió algo?',cls:'chip-soon'};
    if(d<=45)return{label:'Última llamada',cls:'chip-urgent'};
    return{label:'Pausa 90d',cls:'chip-wait'};
  }
  if(s.includes('solo contactado')){
    if(d<=7) return{label:'2do intento',cls:'chip-ok'};
    if(d<=14)return{label:'3er intento',cls:'chip-soon'};
    if(d<=21)return{label:'Último intento',cls:'chip-urgent'};
    return{label:'Archivar',cls:'chip-wait'};
  }
  return{label:'Contactar',cls:'chip-ok'};
}
function tempBadge(p){
  const s=(p.etapa||'').toLowerCase(); const d=p.diasSinActividad;
  if(s.includes('cerrado')||s.includes('ganado'))return{label:'Cerrado',cls:'bg'};
  if(d===null)return{label:'Sin contactar',cls:'bgr'};
  if(s.includes('reunión 2')||s.includes('reunion 2')){
    if(d<=14)return{label:'Caliente',cls:'br'};
    if(d<=30)return{label:'Tibio',cls:'bo'};
    return{label:'Enfriando',cls:'by'};
  }
  if(s.includes('reunión 1')||s.includes('reunion 1')){
    if(d<=10)return{label:'Activo',cls:'bo'};
    if(d<=21)return{label:'Tibio',cls:'by'};
    return{label:'Frío',cls:'bb'};
  }
  if(s.includes('solo contactado')){
    if(d<=7)return{label:'Reciente',cls:'by'};
    return{label:'Sin respuesta',cls:'bgr'};
  }
  return{label:'Pendiente',cls:'bgr'};
}

// ── DATE / CSV ────────────────────────────────────────────────────────────────
function parseDate(v){
  if(!v)return null;
  const s=String(v).trim();
  if(!s||s.length<4)return null;
  if(/^\d{5}$/.test(s)){const n=parseInt(s);if(n>40000&&n<60000)return new Date((n-25569)*86400*1000);}
  const p=s.split('/');
  if(p.length===3){let d=parseInt(p[0]),m=parseInt(p[1]),y=parseInt(p[2]);if(y<100)y+=2000;if(y<1990||y>2100)return null;return new Date(y,m-1,d);}
  const d=new Date(s);return isNaN(d)?null:d;
}
function daysSince(d){if(!d)return null;return Math.floor((TODAY-d)/86400000);}

function parseCSV(text){
  const lines=text.trim().split('\n');
  const headers=lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
  return lines.slice(1).map(line=>{
    const vals=[];let cur='';let inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){vals.push(cur.trim());cur='';}
      else cur+=line[i];
    }
    vals.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>obj[h]=(vals[i]||'').replace(/"/g,'').trim());
    return obj;
  });
}

function normalizeRow(r){
  const nombre=r['Nombre']||'';
  if(!nombre||nombre.toLowerCase()==='nombre')return null;
  const fechaC=parseDate(r['Primer contacto fecha']);
  const fechaR1=parseDate(r['Reunión 1 fecha']||r['Reunion 1 fecha']);
  const fechaR2=parseDate(r['Reunión 2 fecha']||r['Reunion 2 fecha']);
  const fechaRC=parseDate(r['Reunión de cierre']||r['Reunión 3']||r['Reunion 3']);
  const fechaCierre=parseDate(r['Cierre']);
  const etapa=r['Etapa Actual']||r['etapa actual']||'';
  const esCerrado=etapa.toLowerCase().includes('cerrado')||etapa.toLowerCase().includes('ganado')||!!fechaCierre;
  const lastDate=esCerrado?null:(fechaR2||fechaR1||fechaC);
  const diasSinActividad=lastDate?daysSince(lastDate):null;

  const prodAhorro=r['Producto Ahorro/Inversión']||r['Producto Ahorro']||'';
  const montoAhorro=r['Monto Ahorro']||'';
  const prodVida=r['Producto Vida']||'';
  const montoVida=r['Monto Vida']||'';
  const tipoPatrimonial=r['Tipo Patrimonial']||'';
  const primaPatrimonial=r['Prima Patrimonial']||'';
  const prodInversion=r['Producto Inversión']||r['Producto Inversion']||'';
  const montoInversion=r['Monto Inversión']||r['Monto Inversion']||'';
  const comentario=r['Comentario']||r['Comentarios']||'';
  const proximoContacto=r['Próximo contacto']||r['Proximo contacto']||'';

  const pChip=proximoContactoChip(proximoContacto);

  const p={
    nombre,
    relacion:r['Relación']||r['Relacion']||'',
    ubicacion:r['Ubicación']||r['Ubicacion']||'',
    ocupacion:r['Ocupación']||r['Ocupacion']||'',
    ingreso:r['Ingreso estimado']||'',
    edad:r['Edad']||'',
    confianza:r['Confianza']||'',
    etapa,referidos:r['Referidos']||'',
    comentario,proximoContacto,proximoContactoChip:pChip,
    prodAhorro,montoAhorro,
    prodVida,montoVida,
    tipoPatrimonial,primaPatrimonial,
    prodInversion,montoInversion,
    fechaC,fechaR1,fechaR2,fechaRC,fechaCierre,
    diasSinActividad,esCerrado,
    // Comisiones
    commAhorro:calcComision(prodAhorro,montoAhorro),
    commVida:calcComision(prodVida,montoVida),
    commPatrimonial:calcComision(tipoPatrimonial,primaPatrimonial),
    commInversion:calcComision(prodInversion,montoInversion),
  };
  // Descartado si próximo contacto = NO
  p.isDescartado=proximoContacto.trim().toUpperCase()==='NO';
  p.score=calcScore(p);
  p.producto=suggestProduct(p);
  p.reintentoInfo=reintento(p);
  p.tempInfo=tempBadge(p);
  return p;
}

// ── TOTALES COMISIONES ────────────────────────────────────────────────────────
function sumComisiones(prospects){
  let cobrada=0,pendiente=0,mensualInviu=0,recurrente=0;
  prospects.forEach(p=>{
    [p.commAhorro,p.commVida,p.commPatrimonial,p.commInversion].forEach(c=>{
      if(!c)return;
      if(c.tipo==='inviu'){mensualInviu+=c.mensual||0;}
      else if(c.tipo==='patrimonial'){recurrente+=c.total||0;}
      else{cobrada+=c.cobrada||0;pendiente+=c.pendiente||0;}
    });
  });
  return{cobrada,pendiente,mensualInviu,recurrente};
}

function el(tag,props={},children=[]){
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==='className')e.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e[k]=v;
    else e.setAttribute(k,v);
  });
  children.forEach(c=>{if(c==null)return;typeof c==='string'?e.appendChild(document.createTextNode(c)):e.appendChild(c);});
  return e;
}

            content+=` · ${formatNum(monto)} · `;
            chip.appendChild(document.createTextNode(content));
            chip.appendChild(el('span',{className:'comm-tag-recurrente'},[formatNum(comm.total)+'/año']));
          } else {
            const c1=formatNum(comm.cobrada);
            const c2=comm.pendiente>0?formatNum(comm.pendiente):'';
            chip.appendChild(document.createTextNode(prod+' · '+formatNum(monto)+' · '));
            chip.appendChild(el('span',{className:'comm-tag-cobrada'},[c1]));
            if(c2){
              chip.appendChild(document.createTextNode(' + '));
              chip.appendChild(el('span',{className:'comm-tag-pendiente'},[c2+' pend.']));
            }
          }
        } else {
          chip.appendChild(document.createTextNode(content+(monto?' · '+monto:'')));
        }
        products.appendChild(chip);
      };

      addProduct(p.prodAhorro,p.montoAhorro,p.commAhorro);
      addProduct(p.prodVida,p.montoVida,p.commVida);
      addProduct(p.tipoPatrimonial,p.primaPatrimonial,p.commPatrimonial);
      addProduct(p.prodInversion,p.montoInversion,p.commInversion);

      if(products.children.length)row.appendChild(products);
      if(p.comentario)row.appendChild(el('div',{className:'pr-comment'},['💬 '+p.comentario]));
      cl.appendChild(row);
    });
    if(!cerrados.length)cl.appendChild(el('div',{style:{textAlign:'center',color:'#888',padding:'24px',fontSize:'12px'}},['Aún no hay cierres registrados.']));
    cc.appendChild(cl);content.appendChild(cc);
  }

  // ── CHAT IA ─────────────────────────────────────────────────────────────────
  else if(currentTab==='chat'){
    if(!apiKey){
      const box=el('div',{className:'api-key-box'});
      box.innerHTML=`<div style="font-size:16px;font-weight:500;margin-bottom:8px">Configurar Chat IA</div><div style="font-size:12px;color:#888;max-width:380px;margin:0 auto;line-height:1.7">Necesitás una API key de Anthropic.<br><a href="https://console.anthropic.com/keys" target="_blank" style="color:#3b82f6;font-weight:500">Obtener API key →</a></div><input class="api-key-input" type="password" id="api-key-inp" placeholder="sk-ant-api03-..." /><br><button class="btn-primary" onclick="saveKey()">Guardar y continuar</button><div style="font-size:10px;color:#aaa;margin-top:10px">La clave se guarda solo en tu navegador.</div>`;
      content.appendChild(box);return;
    }
    const chatCard=el('div',{className:'chat-box'});
    const msgs=el('div',{className:'chat-messages',id:'chat-msgs'});
    chatMessages.forEach(m=>{const d=el('div',{className:'msg '+(m.role==='user'?'msg-user':'msg-ai')},[m.text]);if(m.loading)d.style.opacity='.6';msgs.appendChild(d);});
    chatCard.appendChild(msgs);
    const quick=el('div',{className:'quick-btns'});
    ['¿A quién llamo hoy?','¿Cuánto voy a cobrar este mes?','Top 5 para cerrar esta semana','¿Quiénes son candidatos a Zurich?','Análisis del embudo','Familia sin contactar'].forEach(q=>{
      quick.appendChild(el('button',{className:'quick-btn',onclick:()=>sendChat(q)},[q]));
    });
    chatCard.appendChild(quick);
    const inputRow=el('div',{className:'chat-input-row'});
    const inp=el('input',{type:'text',className:'chat-input',placeholder:'Preguntá sobre tu pipeline...'});
    inp.onkeydown=e=>{if(e.key==='Enter'&&!chatLoading&&inp.value.trim())sendChat(inp.value);};
    const btn=el('button',{className:'chat-send',onclick:()=>{if(inp.value.trim())sendChat(inp.value);}},['Enviar →']);
    if(chatLoading)btn.disabled=true;
    inputRow.appendChild(inp);inputRow.appendChild(btn);
    chatCard.appendChild(inputRow);
    const footer=el('div',{style:{padding:'4px 8px 8px',display:'flex',justifyContent:'flex-end'}});
    footer.appendChild(el('button',{style:{fontSize:'10px',color:'#aaa',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit'},onclick:()=>{apiKey='';localStorage.removeItem('crm_api_key');render();}},['Cambiar API key']));
    chatCard.appendChild(footer);
    content.appendChild(chatCard);
    setTimeout(()=>{const m=document.getElementById('chat-msgs');if(m)m.scrollTop=m.scrollHeight;},50);
  }
}

window.saveKey=function(){
  const v=document.getElementById('api-key-inp').value.trim();
  if(v){apiKey=v;localStorage.setItem('crm_api_key',v);render();}
};

async function sendChat(text){
  chatMessages.push({role:'user',text});
  chatMessages.push({role:'ai',text:'Analizando tu pipeline…',loading:true});
  chatLoading=true;render();
  const activos=allProspects.filter(p=>p.fechaC&&!p.esCerrado&&!p.isDescartado);
  const cerrados=allProspects.filter(p=>p.esCerrado);
  const tots=sumComisiones(cerrados);
  const context=`CRM asesor financiero independiente. Argentina. Hoy: ${TODAY.toLocaleDateString('es-AR')}.

PRODUCTOS Y COMISIONES:
• Ahorro/Inversión (50% cierre, 50% a 6m): Zurich Invest 32.88%, Zurich Invest Joven 32.88%, Zurich Impact 32.88%, Life Ahorro 35.37%
• Ahorro IT (100% al cierre): IT S&P15 34%, IT S&P20 37.4%, IT Evolution15 25.5%, IT Evolution20 34%, IT Evolution25 42.5%
• Vida (50% cierre, 50% a 6m): Zurich Options/Easy Life/University 40.46%, Life Vida/Certus 35.37%
• Patrimonial: 7% recurrente anual
• Inversión única: 3% del monto (Zurich Advanced, IT Platinum, IT Access)
• INVIU: ~USD1 por cada USD1000 invertido/mes

COMISIONES ACUMULADAS:
Cobrada: ${formatNum(tots.cobrada)} | Pendiente (6m): ${formatNum(tots.pendiente)} | Patrimonial recurrente: ${formatNum(tots.recurrente)}/año | INVIU: ~USD${Math.round(tots.mensualInviu)}/mes

PIPELINE: BD:${allProspects.length} | Activos:${activos.length} | Cerrados:${cerrados.length} | Sin contactar:${allProspects.filter(p=>!p.fechaC&&!p.esCerrado).length}

ACTIVOS TOP:
${activos.sort((a,b)=>b.score-a.score).slice(0,18).map(p=>`• ${p.nombre} | ${p.relacion} | ${p.ingreso||'?'} | conf:${p.confianza||'?'} | ${p.edad||'?'} | ${p.ubicacion||'AR'} | ${p.etapa} | ${p.diasSinActividad!=null?p.diasSinActividad+'d':'—'} | score:${p.score} | ${p.producto.label} | ${p.reintentoInfo.label}${p.comentario?' | '+p.comentario:''}`).join('\n')}

CERRADOS:
${cerrados.map(p=>`• ${p.nombre} | ${[p.prodAhorro,p.prodVida,p.tipoPatrimonial,p.prodInversion].filter(Boolean).join('+')||'sin producto'} | comisión: ${formatNum((p.commAhorro?.total||0)+(p.commVida?.total||0)+(p.commPatrimonial?.total||0)+(p.commInversion?.total||0))}`).join('\n')||'Ninguno'}`;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,system:`Sos un director comercial experto en asesoría financiera en Argentina. Das recomendaciones concretas y accionables en español rioplatense. Máximo 200 palabras. Priorizás la acción inmediata. Usás nombres propios. Cuando sugerís producto justificás en una línea. Nunca empezás con "Claro" o "Por supuesto". Foco: Zurich, Life e IT exterior son los productos con mayor comisión.\n\n${context}`,messages:chatMessages.filter(m=>!m.loading).slice(-10).map(m=>({role:m.role==='user'?'user':'assistant',content:m.text}))})});
    const data=await resp.json();
    const aiText=data.content?.[0]?.text||(data.error?.message||'Sin respuesta.');
    chatMessages=chatMessages.filter(m=>!m.loading);
    chatMessages.push({role:'ai',text:aiText});
  }catch(e){
    chatMessages=chatMessages.filter(m=>!m.loading);
    chatMessages.push({role:'ai',text:'Error de conexión. Verificá que la API key sea válida.'});
  }
  chatLoading=false;render();
}

async function init(){
  dataStatus='loading';render();
  const text=await fetchData();
  if(text){
    allProspects=parseCSV(text).map(normalizeRow).filter(Boolean);
    dataStatus='ok';loadedAt=new Date();
  }else{dataStatus='error';}
  render();
}
init();
</script>
</body>
